<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>그들은 황혼을 견디고 여명을 마주쳤다. 숲 속, 새들의 지저귐은 멈췄는가?</title>
    <style>
        body { text-align: center; background-color: #f7f7f7; font-family: sans-serif; }
        canvas { 
            background: rgba(255, 255, 255, 0.18); 
            display: block; margin: 20px auto; border-bottom: 3px solid #333; 
        }
        #retryBtn { 
            padding: 10px 20px; font-size: 20px; cursor: pointer; display: none;
            background: #ff5722; color: white; border: none; border-radius: 5px;
            margin: 10px auto;
        }
        /* [추가] 하단 체력(하트) 디스플레이 스타일 */
        #hpDisplay {
            font-size: 30px;
            color: #ff3838;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>세계의 운명을 바꾸기 위한 당신의 여정이 시작된다!!</h1>
        <h2 id="msg">스페이스를 눌러 모험 떠나기</h2>
        <h2 id="scoreDisplay">점수: 0</h2>
    </div>
    
    <canvas id="gameCanvas" width="1000" height="400"></canvas>
    <button id="retryBtn" onclick="location.reload()">다시 도전</button>

    <div id="hpDisplay">체력: ♥︎♥︎♥︎</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 플레이어 달리기용 이미지 2장과 점프용 이미지 1장 
        const playerRun1 = new Image(); playerRun1.src = 'cat_player(1).png'; 
        const playerRun2 = new Image(); playerRun2.src = 'cat_player(2).png'; 
        const playerJump = new Image(); playerJump.src = 'cat_player_jump.png'; 

        // 장애물 종류별로 이미지 객체 생성
        const treeImg = new Image(); treeImg.src = 'tree.png';             
        const rockImg = new Image(); rockImg.src = 'rock.png';             

        const birdImg1 = new Image(); birdImg1.src = 'cuckoospawn_human_fry(1).png';          
        const birdImg2 = new Image(); birdImg2.src = 'cuckoospawn_human_fry(2).png';          

        let isStarted = false;
        let isGameOver = false;
        let score = 0;
        
        // 속도 및 하한선 설정
        let speed = 5;        
        const maxSpeed = 12;  
        const minSpeed = 3.0; // [추가] 피격 시 속도가 떨어질 수 있는 최하 한계선

        let player = { x: 60, y: 330, w: 50, h: 70, dy: 0 };
        let obstacles = [];
        let frame = 0;

        // 중력 및 도약 힘
        const gravity = 0.18;      
        const jumpForce = -8.5;

        // 다음 장애물이 나올 때까지 버텨야 하는 랜덤 간격을 저장할 변수
        let nextSpawnInterval = 120;

        // [추가] 체력 시스템 변수 선언 (기본 목숨 3개)
        let hp = 3;

        function update() {
            if (!isStarted || isGameOver) return;

            ctx.clearRect(0, 0, 1000, 400); 

            // 현재 속도를 점수에 누적
            score += speed; 
            let displayScore = Math.floor(score / 50);
            document.getElementById('scoreDisplay').innerText = "점수: " + displayScore;

            // 게임 프레임(시간)에 비례해서 속도 증가
            if (speed < maxSpeed) 
            {
                if (hp < 3) 
                {
                    if(speed <= 8){
                        speed += 0.0025;
                    }
                    else{
                        speed += 0.0005; 
                    }
                }
                else
                {
                    speed += 0.0005; 
                }
            }

            // 플레이어 움직임 (중력)
            player.dy += gravity; 
            player.y += player.dy;

            if (player.y > 330) { 
                player.y = 330;
                player.dy = 0;
            }
            
            // 플레이어 상태(바닥/공중)에 따라 움직이는 이미지 렌더링
            if (player.y < 330) {
                ctx.drawImage(playerJump, player.x, player.y, player.w, player.h);
            } else {
                if (frame % 48 < 24) {
                    ctx.drawImage(playerRun1, player.x, player.y, player.w, player.h);
                } else {
                    ctx.drawImage(playerRun2, player.x, player.y, player.w, player.h);
                }
            }

            // 장애물 스폰 파트
            if (frame >= nextSpawnInterval) {
                let randType = Math.floor(Math.random() * 3) + 1; 
                
                if (randType === 1) {
                    obstacles.push({ type: 1, x: 1000, y: 300, w: 60, h: 100 });
                } else if (randType === 2) {
                    obstacles.push({ type: 2, x: 1000, y: 320, w: 140, h: 92 });
                } else if (randType === 3) {
                    // 새가 생성될 때 프레임 리셋에 날갯짓이 끊기지 않도록 개별 타이머 속성(animFrame)을 부여합니다.
                    obstacles.push({ type: 3, x: 1000, y: 260, w: 80, h: 65, animFrame: 0 });
                }

                frame = 0; // 카운터 리셋

                // 다음번 장애물 간격 랜덤 계산
                let minInterval = Math.floor(170 + (speed * 1.2));
                let maxInterval = Math.floor(260 + (speed * 1.2));
                nextSpawnInterval = Math.floor(Math.random() * (maxInterval - minInterval + 1)) + minInterval;
            }

            // 4. 장애물 움직이기 & 충돌 체크
            obstacles.forEach((ob, i) => {
                ob.x -= speed;
                
                if (ob.type === 1) {
                    ctx.drawImage(treeImg, ob.x, ob.y, ob.w, ob.h);
                } 
                else if (ob.type === 2) {
                    ctx.drawImage(rockImg, ob.x, ob.y, ob.w, ob.h);
                } 
                else if (ob.type === 3) {
                    ob.animFrame++; // 새 전용 타이머 누적
                    if (ob.animFrame % 80 < 40) {
                        ctx.drawImage(birdImg1, ob.x, ob.y, ob.w, ob.h);
                    } else {
                        ctx.drawImage(birdImg2, ob.x, ob.y, ob.w, ob.h);
                    }
                }

                // 충돌 체크 (크기와 좌표가 유동적이라 기존 공식 그대로 써도 완벽 작동!)
                if (player.x < ob.x + ob.w && player.x + player.w > ob.x &&
                    player.y < ob.y + ob.h && player.y + player.h > ob.y) {
                    
                    // [처리 1] 연속 충돌 버그를 막기 위해 부딪힌 장애물은 즉시 소멸 처리
                    obstacles.splice(i, 1);
                    
                    // [처리 2] 체력 감소 및 UI 하트 반영
                    hp--;
                    updateHpDisplay();

                    // [처리 3] 현재 속도에서 -5.0 하되, 최소 3.0보다 느려지지 않도록 방어
                    if (speed >= 9)
                    {
                        speed = 5;
                    }

                    else{
                        speed = Math.max(minSpeed, speed - 3.0);

                    }
                    
                    //nextSpawnInterval = Math.floor(Math.random() * 100) + 300;

                    // [처리 4] 체력이 0 이하가 되면 최종 게임 오버
                    if (hp <= 0) {
                        endGame();
                    }
                }

                if (ob.x < -100) obstacles.splice(i, 1);
            });

            frame++; 
            requestAnimationFrame(update);
        }

        // [추가] 하단 HTML 영역에 하트 개수를 표시해 주는 함수
        function updateHpDisplay() {
            let hearts = "";
            for (let i = 0; i < hp; i++) {
                hearts += "♥︎";
            }
            if (hp <= 0) hearts = " ";
            document.getElementById('hpDisplay').innerText = "체력: " + hearts;
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('msg').innerText = "당신은 세계를 구하는데 실패했습니다... 세계는 다시 종말의 길을 향해 나아갑니다..";
            document.getElementById('retryBtn').style.display = "block";
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (!isStarted) {
                    isStarted = true;

                    let minInterval = Math.floor(170 + (speed * 1.2));
                    let maxInterval = Math.floor(260 + (speed * 1.2));
                    nextSpawnInterval = Math.floor(Math.random() * (maxInterval - minInterval + 1)) + minInterval;

                    update();
                } else if (player.y === 330) { 
                    player.dy = jumpForce;
                }
            }
        });
    </script>
</body>
</html>
